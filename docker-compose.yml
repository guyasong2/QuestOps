version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: questops-backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    env_file:
      - ./backend/.env
    environment:
      # Override the .env value for Docker networking
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    restart: unless-stopped
    # Use extra_hosts so the container can reach Ollama running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
